<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>원단 샘플 검색</title>
  <link href="/style.css" rel="stylesheet">
</head>
<body>
  <main class="search-page" aria-label="원단 샘플 검색">
    <section class="search-panel">
      <div class="upload-bar">
        <button class="upload-button" id="print-labels" type="button">라벨 인쇄</button>
        <a class="upload-button" href="/fabric_sample_upload_template.xlsx" download>양식 다운로드</a>
        <label class="upload-button" for="sample-file">엑셀 업로드</label>
        <input id="sample-file" type="file" accept=".xlsx,.xls,.csv">
        <p id="data-status" aria-live="polite">테스트 원단 10개가 준비되었습니다.</p>
      </div>

      <form class="search-form" id="sample-search-form" role="search">
        <label class="visually-hidden" for="sample-field">검색 키워드 선택</label>
        <select id="sample-field" name="field" aria-label="검색 키워드 선택">
          <option value="all">전체 키워드</option>
          <option value="code">품번</option>
          <option value="sampleName">원단명</option>
          <option value="material">소재</option>
          <option value="blendRatio">혼용률</option>
          <option value="weave">조직</option>
          <option value="weight">중량</option>
          <option value="density">밀도</option>
          <option value="yarn">원사</option>
          <option value="color">컬러</option>
          <option value="finish">가공</option>
          <option value="functionality">기능성</option>
          <option value="usage">용도</option>
          <option value="location">보관 위치</option>
        </select>
        <label class="visually-hidden" for="sample-search">원단 샘플 검색</label>
        <input
          id="sample-search"
          name="q"
          type="search"
          autocomplete="off"
          placeholder="검색어를 입력하세요"
          aria-label="원단 샘플 검색어"
        >
        <button type="submit" aria-label="검색">검색</button>
      </form>

      <section class="results" id="results" aria-live="polite"></section>
    </section>
    <section class="print-labels" id="print-labels-area" aria-hidden="true"></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
